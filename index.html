<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <style>
    body {
      background-color: #121213;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 20px;
    }

    #game {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    #start-button {
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
    }

    #timer {
      font-size: 1.2rem;
      font-weight: bold;
    }

    #message {
      min-height: 24px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: bold;
    }

    #board {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .chain-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chain-input {
      width: 120px;
      padding: 10px;
      font-size: 1rem;
      text-transform: uppercase;
      text-align: center;
      border: 2px solid #565758;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .chain-input::placeholder {
      color: #d8d8d8;
      opacity: 1;
    }

    .chain-letter {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: bold;
      background-color: #b59f3b;
      color: white;
      border: 2px solid #d6c25c;
      border-radius: 8px;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    .chain-letter.hidden-letter {
      background-color: #3a3a3c;
      border-color: #565758;
      color: white;
    }

    .valid-row {
      background-color: #2f855a;
      border-radius: 8px;
      padding: 8px;
    }

    .valid-step {
      border-color: #2f855a !important;
    }

    .invalid-step {
      border-color: #c53030 !important;
    }

    .letter-box-yellow {
      background-color: #b59f3b;
      border-color: #d6c25c;
    }

    .letter-box-green {
      background-color: #2f855a;
      border-color: #68d391;
    }

    .letter-box-red {
      background-color: #c53030;
      border-color: #fc8181;
    }

    .field-in-progress,
    .field-provisional {
      border-width: 3px;
      border-color: #b59f3b;
    }

    .field-confirmed {
      border-width: 3px;
      border-color: #2f855a;
    }

    .field-error {
      border-width: 3px;
      border-color: #c53030;
    }

#score-panel {
  text-align: center;
  margin-bottom: 8px;
  padding: 14px 18px;
  background-color: #1f1f21;
  border: 2px solid #3a3a3c;
  border-radius: 12px;
  max-width: 280px;
  margin-left: auto;
  margin-right: auto;
}

#score-label {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #aaa;
  margin-bottom: 4px;
}

#current-score {
  font-size: 2rem;
  font-weight: bold;
  line-height: 1.1;
  color: white;
}

#score-message {
  margin-top: 6px;
  font-size: 0.95rem;
  color: #d6c25c;
  min-height: 1.2em;
}

    #current-score-line,
    #best-score-line {
      margin: 4px 0;
    }

    .dictionary-invalid-text {
      color: #fc8181;
    }

    @keyframes dictionaryShake {
      0% {
        transform: translateX(0);
      }
      20% {
        transform: translateX(-6px);
      }
      40% {
        transform: translateX(6px);
      }
      60% {
        transform: translateX(-5px);
      }
      80% {
        transform: translateX(5px);
      }
      100% {
        transform: translateX(0);
      }
    }

    .dictionary-shake {
      animation: dictionaryShake 0.35s;
    }

    @keyframes rowDropIn {
      0% {
        opacity: 0;
        transform: translateY(-36px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bottomRowBump {
      0% {
        opacity: 0;
        transform: translateY(-36px);
      }
      30% {
        opacity: 1;
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
      100% {
        transform: translateY(0);
      }
    }

    .dropping-row {
      animation: rowDropIn 0.34s ease-out;
    }

    .bottom-bump-row {
      animation: bottomRowBump 0.65s ease;
    }

    .revealed-letter {
      color: white;
    }

    @keyframes letterSpinReveal {
      0% {
        transform: perspective(500px) rotateY(0deg);
        background-color: #9c8a33;
        border-color: #b59f3b;
        color: transparent;
      }
      49% {
        transform: perspective(500px) rotateY(180deg);
        background-color: #b59f3b;
        border-color: #d6c25c;
        color: transparent;
      }
      50% {
        transform: perspective(500px) rotateY(180deg);
        background-color: #d6c25c;
        border-color: #f0df87;
        color: white;
      }
      100% {
        transform: perspective(500px) rotateY(360deg);
        background-color: #d6c25c;
        border-color: #f0df87;
        color: white;
      }
    }

    .spinning-letter {
      animation: letterSpinReveal 0.8s ease-in-out;
      transform-style: preserve-3d;
      backface-visibility: hidden;
    }

    .submit-box {
      margin-top: 20px;
      padding: 16px;
      background: #1f1f21;
      border-radius: 10px;
      text-align: center;
    }

    .submit-message {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .submit-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .submit-buttons button {
      padding: 8px 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .submit-note {
      font-size: 0.8rem;
      color: #aaa;
    }

    #share-container {
      display: flex;
      justify-content: center;
      margin-top: 20px;

      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #share-container.visible {
      opacity: 1;
    }

    #share-btn {
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: bold;
      letter-spacing: 0.5px;

      background-color: #2d2d30;
      color: white;
      border: 2px solid #3a3a3c;
      border-radius: 8px;

      cursor: pointer;
      transition: all 0.15s ease;
    }

    #share-btn:hover {
      background-color: #3a3a3c;
      border-color: #565758;
    }

    #share-btn:active {
      transform: scale(0.96);
    }

    #share-btn:hover {
      box-shadow: 0 0 8px rgba(240, 223, 135, 0.4);
    }

    #mode-panel {
      margin-bottom: 12px;
      text-align: center;
    }

    #mode-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    #mode-buttons button,
    #load-practice-btn {
      padding: 8px 14px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      border: 2px solid #3a3a3c;
      background-color: #2d2d30;
      color: white;
    }

    #practice-panel {
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    #practice-panel.visible {
      display: flex;
    }

    #practice-phrase-input {
      width: 260px;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid #565758;
      background-color: #121213;
      color: white;
      text-transform: uppercase;
      text-align: center;
    }

    .mode-selected {
      background-color: #b59f3b !important;
      border-color: #d6c25c !important;
      color: black !important;
    }

    .warning-spacer {
      height: 12px;
    }

    #puzzle-label {
      text-align: center;
      font-weight: bold;
      margin-bottom: 12px;
      color: #d6c25c;
    }

    #share-container {
      display: flex;
      justify-content: center;
      gap: 10px;
    }
  </style>
  <body>
    <div id="game">
      <h1>AddaGrams</h1>

<div id="score-panel" hidden>
  <div id="score-label">Letters used</div>
  <div id="current-score">0</div>
  <div id="score-message"></div>
</div>
      <div id="message"></div>
      <div id="mode-panel">
        <div id="mode-buttons">
          <button id="daily-mode-btn">Daily Puzzle</button>
          <button id="practice-mode-btn">Practice Mode</button>
        </div>

        <div id="practice-panel" hidden>
          <input
            id="practice-phrase-input"
            type="text"
            placeholder="Enter two-word phrase"
          />
          <button id="load-practice-btn">Load Practice Puzzle</button>
        </div>

        <div id="fairness-warning" hidden></div>
      </div>
      <div id="puzzle-label"></div>
      <div id="board"></div>
    </div>
    <div id="share-container" hidden>
      <button id="share-puzzle-btn">Share Puzzle</button>
      <button id="share-results-btn">Share Results</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
